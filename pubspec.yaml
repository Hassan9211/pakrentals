name: pakrentals
description: "PakRentals - Pakistan's Premier Rental Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Stripe Payment
  flutter_stripe: ^11.1.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Fonts
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.0

  # Image/File Picker
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Date/Calendar
  table_calendar: ^3.1.2

  # UI Utilities
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.2.0+3
  intl: ^0.19.0
  crypto: ^3.0.5
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  pinput: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
